<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة السيكورتي</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  direction: rtl;
  color: white;
  transition: 0.5s;
}

.box {
  margin-top: 100px;
  font-size: 35px;
}

.small {
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🚨 لوحة المراقبة</h1>

<div class="box" id="status">جاري التحميل...</div>
<div class="small" id="info"></div>

<script>

// 🔥 نفس الرابط (مهم)
const url = "https://firestore.googleapis.com/v1/projects/smart-parking-9c85f/databases/(default)/documents/reservations/A1";

// 👇 مهم: نضيف قراءة الحساس من ESP
// عشان السيكورتي يعرف هل فيه سيارة

let lastAlert = false;

function check() {
  fetch(url)
  .then(res => res.json())
  .then(data => {

    if (!data.fields) return;

    const active = data.fields.active.booleanValue;

    // 👇 منطق العرض

    // 🟢 محجوز
    if (active) {
      document.body.style.background = "green";
      document.getElementById("status").innerHTML = "🟢 الموقف محجوز";
      document.getElementById("info").innerHTML = "الوضع طبيعي";

      lastAlert = false;
    }

    // ⚪ فاضي
    else {
      document.body.style.background = "black";
      document.getElementById("status").innerHTML = "⚪ الموقف متاح";
      document.getElementById("info").innerHTML = "لا يوجد حجز";

      lastAlert = false;
    }

  });
}

setInterval(check, 2000);

</script>

</body>
</html>
