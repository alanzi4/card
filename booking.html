<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حجز موقف</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  direction: rtl;
  background: #f5f5f5;
}

button {
  padding: 15px 25px;
  font-size: 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.book {
  background: green;
  color: white;
}

.cancel {
  background: red;
  color: white;
}

.status {
  margin-top: 20px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>🚗 نظام حجز المواقف</h1>

<button class="book" onclick="reserve()">حجز موقف</button>
<button class="cancel" onclick="cancel()">إلغاء الحجز</button>

<div class="status" id="status">جاري التحميل...</div>

<script>

// 🔥 نفس الرابط المستخدم في ESP (مهم جدًا)
const url = "https://firestore.googleapis.com/v1/projects/smart-parking-9c85f/databases/(default)/documents/reservations/A1";

// 🟢 حجز
function reserve() {
  fetch(url + "?updateMask.fieldPaths=active", {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      fields: {
        active: { booleanValue: true }
      }
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerHTML = "✅ تم حجز الموقف";
  })
  .catch(err => {
    console.log(err);
    alert("❌ فشل الحجز");
  });
}

// 🔴 إلغاء
function cancel() {
  fetch(url + "?updateMask.fieldPaths=active", {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      fields: {
        active: { booleanValue: false }
      }
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerHTML = "❌ تم إلغاء الحجز";
  })
  .catch(err => {
    console.log(err);
    alert("❌ فشل الإلغاء");
  });
}

// 🔄 تحديث الحالة كل ثانيتين
function checkStatus() {
  fetch(url)
  .then(res => res.json())
  .then(data => {

    if (!data.fields) return;

    const active = data.fields.active.booleanValue;

    if (active) {
      document.getElementById("status").innerHTML = "🟢 الموقف محجوز";
    } else {
      document.getElementById("status").innerHTML = "⚪ الموقف متاح";
    }

  });
}

setInterval(checkStatus, 2000);

</script>

</body>
</html>
